; Polybar config — minimal VM-friendly baseline.
; Single bar at top, designed for a single virtual monitor (Virtual-1 / Virtual1
; under Parallels, virtio-gpu output under UTM). Detects the active output
; via launch script (see launch.sh).

[colors]
background     = #181818
background-alt = #383838
foreground     = #d8d8d8
foreground-alt = #f8f8f8
primary        = #a1b56c
secondary      = #7cafc2
alert          = #ab4642
disabled       = #585858

[bar/main]
width            = 100%
height           = 26pt
radius           = 0
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2pt
border-size      = 0
padding-left     = 0
padding-right    = 1
module-margin    = 1
separator        = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=12;3

modules-left   = i3
modules-center = date
modules-right  = filesystem memory cpu

cursor-click   = pointer
enable-ipc     = true
wm-restack     = i3

[module/i3]
type            = internal/i3
pin-workspaces  = true
show-urgent     = true
strip-wsnumbers = true
index-sort      = true
enable-click    = true
enable-scroll   = false

label-focused            = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline  = ${colors.primary}
label-focused-padding    = 1

label-unfocused          = %name%
label-unfocused-padding  = 1

label-visible            = %name%
label-visible-padding    = 1

label-urgent             = %name%
label-urgent-background  = ${colors.alert}
label-urgent-padding     = 1

[module/filesystem]
type     = internal/fs
mount-0  = /
interval = 30
label-mounted = %{F#a1b56c}%mountpoint%%{F-} %percentage_used%%

[module/memory]
type     = internal/memory
interval = 5
label    = RAM %percentage_used:2%%

[module/cpu]
type     = internal/cpu
interval = 5
label    = CPU %percentage:2%%

[module/date]
type     = internal/date
interval = 1
date     = %Y-%m-%d %H:%M
label    = %date%

[settings]
screenchange-reload = true
pseudo-transparency = false
