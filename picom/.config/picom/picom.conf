; Picom config — minimal compositor for X11 inside a VM.
; Most fancy effects (blur, animations) are pointless overhead in a VM,
; so we keep this lean: shadows + a touch of transparency for inactive windows.

backend = "xrender";
vsync   = true;
detect-rounded-corners   = true;
detect-client-opacity    = true;
detect-transient         = true;
detect-client-leader     = true;
use-damage               = true;

shadow                   = true;
shadow-radius            = 7;
shadow-offset-x          = -7;
shadow-offset-y          = -7;
shadow-opacity           = 0.4;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

inactive-opacity         = 0.95;
frame-opacity            = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'Alacritty' && focused",
    "90:class_g  = 'Alacritty' && !focused"
];

wintypes:
{
    tooltip       = { fade = true; shadow = false; opacity = 0.85; focus = true; };
    dock          = { shadow = false; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
